--- 
- name: Set up an Ubuntu instance
  hosts: localhost
  tasks:
    - name: Update and upgrade
      become: true
      apt:
        upgrade: full
        update_cache: true

    - name: install packages
      become: true
      apt:
        name: 
          - neovim 
          - ranger
          - tmux
          - build-essential      # gcc, g++, make
          - pkg-config
          - libssl-dev
          - perl                 # needed when vendoring OpenSSL
      tags: zellij

    - name: Set editor
      shell: update-alternatives --install /usr/bin/editor editor /usr/bin/nvim 100
      become: true

    - name: Set editor env var
      become: true
      copy:
        content: |
          export EDITOR="/usr/bin/nvim"
        dest: /etc/profile.d/editor.sh

    - name: ensure ranger config directory exists
      tags: rifle
      file:
        path: "{{ lookup('env','HOME') }}/.config/ranger"
        state: directory
        mode: '0755'

    - name: ensure rifle.conf exists
      tags: rifle
      command:
        cmd: ranger --copy-config=rifle
        creates: "~/.config/ranger/rifle.conf"

    - name: open yml / yaml in nvim
      tags: ranger
      blockinfile:
        path: "~/.config/ranger/rifle.conf"
        insertbefore: BOF
        block: |

          # Prefer $EDITOR/$VISUAL for YAML and patch files.
          # Matches .yml, .yaml and .patch; placed before generic/xdg-open rules.
          ext ya?ml|patch, label editor = ${VISUAL:-$EDITOR} -- "$@"
          ext ya?ml|patch, label pager  = ${PAGER:-less} -- "$@"

    - name: Deploy init.lua for Neovim
      tags: neovim
      blockinfile:
        dest: "{{ lookup('env','HOME') }}/.config/nvim/init.lua"
        create: true
        marker: -- {mark} ANSIBLE MANAGED DOTFILE --
        content: |
          -- Press Shift+Tab to deindent
          vim.keymap.set("i", "<S-Tab>", "<C-d>")
          vim.keymap.set("n", "<S-Tab>", "<<")
          vim.keymap.set("v", "<S-Tab>", "<gv")

    - name: Cycle bash completion with TAB
      blockinfile:
        block: |
          set editing-mode vi

          set keymap vi-command
          "\C-l": clear-screen

          set keymap vi-insert
          "\C-l": clear-screen
          TAB: menu-complete
          "\e[Z": menu-complete-backward
          set show-all-if-ambiguous on
          set menu-complete-display-prefix on
        dest: ~/.inputrc
        create: true

    - name: git set up
      shell: git config --global init.defaultBranch main
    - name: git alias
      git_config:
        scope: global
        name: alias.log-graph
        value: log --graph


    - name: Cargo and zellij
      vars:
        cargo_bin:  "~/.cargo/bin/cargo"
        rustup_bin: "~/.cargo/bin/rustup"

      block:
        - name: Ensure rustup
          shell: |
            if [ ! -x "{{ rustup_bin }}" ]; then
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            fi
          args:
            creates: "{{ rustup_bin }}"

        - name: Update toolchain
          command: "{{ rustup_bin }} update stable"

        - name: Install latest Zellij
          community.general.cargo:
            name: zellij
            state: latest
            executable: "{{ cargo_bin }}"
          environment:
            OPENSSL_NO_VENDOR: "1" # force link to system libssl

        - name: Ensure the default Apache port is 8080
          ansible.builtin.lineinfile:
            path: ~/.bashrc
            line:    'export PATH="${HOME}/.cargo/bin:${PATH}"'

        - name: open yml / yaml in nvim
          tags: ranger
          blockinfile:
            path: "~/.config/zellij/config.kdl"
            block: |
              theme "catppuccin-latte"
            create: true

